# ─── Serveur ──────────────────────────────────────────────────────────────────
server.port=8080
spring.threads.virtual.enabled=true

# ─── Base de données SQLite ───────────────────────────────────────────────────
spring.datasource.url=jdbc:sqlite:../pixellife.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ─── Simulation ───────────────────────────────────────────────────────────────
pixellife.simulation.tick-delay-ms=0

# ─── Frontend auto-launch ─────────────────────────────────────────────────────
#
# Active le lancement automatique de la fenêtre OpenGL au démarrage du backend.
# Le frontend est lancé dans un virtual thread après que Tomcat est prêt.
#
pixellife.frontend.auto-launch=true

# Chemin vers le jar frontend compilé.
# Laisser vide pour la résolution automatique (cherche dans ../frontend/target/).
pixellife.frontend.jar-path=

# URL du backend telle qu'elle sera passée au frontend.
pixellife.frontend.backend-url=http://localhost:8080

# Si true : démarre automatiquement une nouvelle simulation et passe son id au frontend.
# Si false : utilise pixellife.frontend.simulation-id (ou la dernière sim en base si 0).
pixellife.frontend.auto-start-simulation=true

# Id de la simulation à visualiser (ignoré si auto-start-simulation=true).
# 0 = utilise la dernière simulation en base.
pixellife.frontend.simulation-id=0

# Arguments JVM supplémentaires passés au process frontend (séparés par des espaces).
pixellife.frontend.jvm-args=--enable-preview
 